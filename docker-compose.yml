services:
  frontend:
    build:
      context: frontend
    env_file:
      - frontend/.env
    volumes:
      - frontend:/app/frontend/dist

  mongo:
    image: mongo
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - db:/data/db
    ports:
      - 27018:27017
    networks:
      - internal

  backend:
    restart: always
    build:
      context: backend
    env_file:
      - backend/.env
    volumes:
      - ./backend/src:/app/src
      - public:/app/src/public
    ports:
      - 3000:3000
    networks:
      - internal
    depends_on:
      - mongo

  server:
    build:
      context: nginx
    ports:
      - 80:80
    volumes:
      - frontend:/var/app
      - public:/var/public
    depends_on:
      - frontend
      - backend
    networks:
      - internal

  mongo-seed:
    image: mongo:latest
    restart: "no"
    depends_on:
      - mongo
    volumes:
      - ./.dump:/dump
    networks:
      - internal
    entrypoint: >
      sh -c "mongoimport --host mongo --username ${MONGO_ROOT_USERNAME} --password ${MONGO_ROOT_PASSWORD} --authenticationDatabase admin --db weblarek --collection users --type json --file /dump/weblarek.users.json --jsonArray &&
             mongoimport --host mongo --username ${MONGO_ROOT_USERNAME} --password ${MONGO_ROOT_PASSWORD} --authenticationDatabase admin --db weblarek --collection products --type json --file /dump/weblarek.products.json --jsonArray"

volumes:
  frontend:
  public:
  db:

networks:
  internal:
